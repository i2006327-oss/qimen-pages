<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f1e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="奇門靜態版">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>奇門遁甲純網頁版</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="stylesheet" href="./styles.css?v=17">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>奇門遁甲純網頁版</h1>
      <p>iOS / Android 可直接用，不需後端 API</p>
    </div>
    <button id="nowBtn" type="button">現在</button>
  </header>

  <main>
    <section class="panel controls">
      <div class="form-grid">
        <label>年<input id="year" inputmode="numeric"></label>
        <label>月<input id="month" inputmode="numeric"></label>
        <label>日<input id="day" inputmode="numeric"></label>
        <label>時<input id="hour" inputmode="numeric"></label>
        <label>分<input id="minute" inputmode="numeric"></label>
      </div>
      <div class="form-stack">
        <label>排盤類型
          <select id="chartType">
            <option>終身盤（出生盤）</option>
            <option>時盤（預測盤）</option>
            <option>刻盤</option>
          </select>
        </label>
        <label>排盤取法
          <select id="yuanMethod">
            <option value="yinpan">陰盤法（教材）</option>
            <option value="branch">日支三元</option>
            <option value="fixed5">節氣五日</option>
          </select>
        </label>
      </div>
      <div id="queryConditions" class="segmented-row">
        <label>人在
          <select id="presence">
            <option>人在現場</option>
            <option>人不在現場</option>
          </select>
        </label>
        <label>問事者
          <select id="askerGender">
            <option>男問</option>
            <option>女問</option>
          </select>
        </label>
        <label>預測師
          <select id="divinerGender">
            <option>男預測師</option>
            <option>女預測師</option>
          </select>
        </label>
      </div>
      <button id="chartBtn" class="primary" type="button">排盤</button>
    </section>

    <section class="panel controls plate-controls">
      <div class="section-title">數字奇門</div>
      <div class="form-stack plate-stack">
        <label>分析類型
          <select id="numberKind">
            <option>手機號碼</option>
            <option>銀行帳戶</option>
            <option>車牌</option>
          </select>
        </label>
        <label>號碼
          <input id="numberInput" autocomplete="off" autocapitalize="characters" placeholder="手機、帳戶或 ABC-1234">
        </label>
        <label>性別
          <select id="numberGender">
            <option>男</option>
            <option>女</option>
          </select>
        </label>
        <label>流年
          <input id="numberYear" inputmode="numeric">
        </label>
      </div>
      <button id="numberBtn" class="primary" type="button">分析數字</button>
    </section>

    <nav class="tabs" aria-label="結果切換">
      <button class="tab active" data-tab="chart">圖形盤</button>
      <button class="tab" data-tab="explain">解說</button>
      <button class="tab" data-tab="issues">統計</button>
      <button class="tab" data-tab="text">文字</button>
      <button class="tab" data-tab="number">數字</button>
    </nav>

    <section id="chart" class="tab-panel active">
      <div class="meta-card">
        <strong id="headerText">尚未排盤</strong>
        <span id="summaryText"></span>
        <span class="legend-line"><b class="legend-fuyin">紫框</b> 伏吟｜<b class="legend-reverse">橘框</b> 反吟｜<b class="legend-reverse">橘標</b> 五不遇時、七宮四害、八宮四害｜天干/地干擊刑紅、入墓藍、兩者同見紫</span>
      </div>
      <div class="chart-scroll">
        <div id="qimenGrid" class="qimen-grid"></div>
      </div>
    </section>

    <section id="explain" class="tab-panel">
      <pre id="explainText" class="text-card"></pre>
    </section>

    <section id="issues" class="tab-panel">
      <pre id="issueText" class="text-card"></pre>
    </section>

    <section id="text" class="tab-panel">
      <pre id="textChart" class="text-card"></pre>
    </section>

    <section id="number" class="tab-panel">
      <div id="numberCards" class="number-cards"></div>
      <pre id="numberText" class="text-card"></pre>
    </section>
  </main>

  <script src="./lunar.js?v=17"></script>
  <script src="./qimen_static_core.js?v=17"></script>
  <script src="./number_core.js?v=17"></script>
  <script src="./qimen_static_app.js?v=17"></script>
</body>
</html>
